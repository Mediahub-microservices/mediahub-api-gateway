spring:
  application:
    name: api-gateway
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      fail-fast: false
      retry:
        initial-interval: 2000
        max-attempts: 5
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: false
      routes:
        - id: user_route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/v1/users/**
        - id: media_route
          uri: lb://MEDIA-SERVICE
          predicates:
            - Path=/api/v1/media/**
        - id: subscription_route
          uri: lb://SUBSCRIPTION-SERVICE
          predicates:
            - Path=/api/v1/subscriptions/**